version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/atoms_demo.db
      - SECRET_KEY=${SECRET_KEY:-atoms-demo-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-agnes-2.0-flash}
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
