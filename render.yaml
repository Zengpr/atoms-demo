services:
  - type: web
    name: atoms-demo-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./atoms_demo.db
      - key: SECRET_KEY
        generateValue: true
      - key: MOCK_MODE
        value: "true"
      - key: CORS_ORIGINS
        value: '["https://atoms-demo.vercel.app","http://localhost:3000"]'
    plan: free
